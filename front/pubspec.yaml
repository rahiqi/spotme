name: spotme
description: "SpotMe: Real-Time Location Sharing Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  image_picker: ^1.1.2
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Map & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  
  # Background execution
  flutter_background_service: ^5.0.7
  flutter_background_service_android: ^6.0.4
  flutter_local_notifications: ^17.0.0
  
  # Networking & Utilities
  web_socket_channel: ^2.4.5
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
