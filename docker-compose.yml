services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - "8120:8080"
    environment:
      - RUST_LOG=info
      - PORT=8080
    restart: unless-stopped

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - TIMESTAMP=${TIMESTAMP:-latest}
    restart: "no"
    volumes:
      - ./artifacts:/artifacts
      - flutter-pub-cache:/root/.pub-cache
      - gradle-cache:/root/.gradle
    environment:
      - PUB_HOSTED_URL=https://pub.flutter-io.cn
      - FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - PORT=3000
      - UPLOAD_SECRET=${UPLOAD_SECRET:-spotme-admin-secret}
    restart: unless-stopped

volumes:
  flutter-pub-cache:
  gradle-cache:
